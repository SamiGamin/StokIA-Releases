      - name: Actualizar Firestore con la nueva versión
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          # Usamos JSON para pasar toda la info del release y procesarla en JS
          RELEASE_DATA: ${{ toJson(github.event.release) }}
        run: |
          cat << 'EOF' > update-script.js
          const admin = require('firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          const release = JSON.parse(process.env.RELEASE_DATA);
          
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          
          const db = admin.firestore();
          
          async function updateDb() {
            try {
              // 1. Buscamos el APK dentro de los "assets" del release
              const apkAsset = release.assets.find(asset => asset.name.endsWith('.apk'));
              
              const datosActualizacion = {
                versionActual: process.env.TAG_NAME.replace(/^v/, ''), // Quita la 'v' si existe
                fechaPublicacion: release.published_at, // Fecha de GitHub
                servidorActualizadoEn: admin.firestore.FieldValue.serverTimestamp(), // Fecha de Firestore
                notasVersion: release.body || "Mejoras generales"
              };

              // 2. Si encontró un APK, guardamos su nombre y el link DIRECTO
              if (apkAsset) {
                datosActualizacion.nombreApk = apkAsset.name;
                datosActualizacion.urlActualizacion = apkAsset.browser_download_url;
                console.log(`Encontrado APK: ${apkAsset.name}`);
              } else {
                // Si no hay APK, guardamos el link de la página por lo menos
                datosActualizacion.urlActualizacion = release.html_url;
                console.log("No se encontró archivo APK en el release, usando link de página.");
              }
              
              await db.collection('configuracion').doc('app').set(datosActualizacion, { merge: true });
              
              console.log(`¡Éxito! Firestore actualizado a la versión ${process.env.TAG_NAME}.`);
            } catch (error) {
              console.error('Error al actualizar Firestore:', error);
              process.exit(1);
            }
          }
          
          updateDb();
          EOF
          
          node update-script.js

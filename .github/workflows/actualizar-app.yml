name: Actualizar Firebase en Nuevo Release

on:
  release:
    types: [published]

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Firebase Admin
        run: npm install firebase-admin

      - name: Actualizar Firestore con la nueva versión
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_DATA: ${{ toJson(github.event.release) }}
        run: |
          cat << 'EOF' > update-script.js
          const admin = require('firebase-admin');
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          const release = JSON.parse(process.env.RELEASE_DATA);
          
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });
          
          const db = admin.firestore();
          
          async function updateDb() {
            try {
              // Buscar el APK en los archivos del release
              const apkAsset = release.assets.find(asset => asset.name.endsWith('.apk'));
              
              const datos = {
                versionActual: process.env.TAG_NAME.replace(/^v/, ''),
                fechaPublicacion: release.published_at, // Fecha de GitHub
                servidorActualizadoEn: admin.firestore.FieldValue.serverTimestamp(),
                notasVersion: release.body || "Mejoras generales"
              };

              if (apkAsset) {
                datos.nombreApk = apkAsset.name; // Nombre del archivo (ej: Stok IA.apk)
                datos.urlActualizacion = apkAsset.browser_download_url; // Link directo
                console.log("APK encontrada:", apkAsset.name);
              } else {
                datos.urlActualizacion = release.html_url;
                console.log("No se encontró APK, usando link de página.");
              }
              
              await db.collection('configuracion').doc('app').set(datos, { merge: true });
              console.log("¡Firestore actualizado correctamente!");
            } catch (error) {
              console.error('Error:', error);
              process.exit(1);
            }
          }
          
          updateDb();
          EOF
          
          node update-script.js
